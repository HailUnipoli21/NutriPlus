<ion-header>
  <ion-toolbar>
    <ion-title>Síntomas</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen>

  <main class="app">

    <section class="screen">

      <!-- Barra superior -->
      <div class="topbar">

        <a
          class="icon-btn"
          routerLink="/home"
          aria-label="Regresar"
        >
          ‹
        </a>

        <h2>
          Evaluar síntomas
        </h2>

        <span class="topbar-spacer"></span>

      </div>

      <!-- Formulario de síntomas -->
      <div class="card">

        <div class="field">

          <label>
            ¿Qué síntomas presentas?
          </label>

          <textarea
            class="textarea"
            placeholder="Ej. dolor de cabeza, fiebre, tos..."
          ></textarea>

        </div>

        <div class="field">

          <label>
            Duración
          </label>

          <select class="select">
            <option>Menos de 24 horas</option>
            <option>1 a 3 días</option>
            <option>Más de 3 días</option>
          </select>

        </div>

        <div class="field">

          <label>
            Nivel de malestar
          </label>

          <select class="select">
            <option>Leve</option>
            <option>Moderado</option>
            <option>Fuerte</option>
          </select>

        </div>

        <a
          class="btn"
          routerLink="/resultado"
        >
          Analizar con IA
        </a>

      </div>

      <!-- Advertencia -->
      <div class="warning-box">
        Si tienes dificultad para respirar, dolor intenso en pecho,
        desmayo o sangrado abundante, busca atención médica inmediata.
      </div>

    </section>

    <!-- Navegación inferior -->
    <nav class="bottom-nav scanner-nav">

      <a
        class="nav-item"
        routerLink="/home"
      >
        <span>🏠</span>
        Inicio
      </a>

      <a
        class="nav-item"
        routerLink="/chat"
      >
        <span>💬</span>
        Chat
      </a>

      <a
        class="camera-nav"
        routerLink="/scan-comida"
        aria-label="Escanear comida"
      >
        <span>📷</span>
      </a>

      <a
        class="nav-item"
        routerLink="/calorias"
      >
        <span>🔥</span>
        Calorías
      </a>

      <a
        class="nav-item"
        routerLink="/perfil"
      >
        <span>👤</span>
        Perfil
      </a>

    </nav>

  </main>

</ion-content>
