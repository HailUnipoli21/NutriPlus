<ion-header>
  <ion-toolbar>
    <ion-title>Registro</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen>

  <main class="app">

    <section class="screen registro-screen">

      <!-- Barra superior -->
      <div class="topbar">

        <a
          class="icon-btn"
          routerLink="/login"
          aria-label="Regresar"
        >
          ‹
        </a>

        <div class="logo">
          <img class="logo-img" src="assets/logo.jpg" alt="NutriPlus Logo" />
          NutriPlus
        </div>

        <span class="topbar-spacer"></span>

      </div>

      <!-- Título -->
      <h1 class="title">
        Crear cuenta
      </h1>

      <p class="subtitle">
        Completa tus datos para comenzar.
      </p>

      <!-- Formulario -->
      <form
        class="card registro-form"
        (ngSubmit)="registrar()"
      >

        <div class="field">

          <label>
            Nombre completo
          </label>

          <input
            class="input"
            type="text"
            placeholder="Nombre y apellido"
            autocomplete="name"
            name="fullName"
            [(ngModel)]="fullName"
            required
          />

        </div>

        <div class="field">

          <label>
            Correo electrónico
          </label>

          <input
            class="input"
            type="email"
            placeholder="tuemail@correo.com"
            autocomplete="email"
            name="email"
            [(ngModel)]="email"
            required
          />

        </div>

        <div class="field">

          <label>
            Contraseña
          </label>

          <input
            class="input"
            type="password"
            placeholder="Mínimo 8 caracteres"
            autocomplete="new-password"
            name="password"
            [(ngModel)]="password"
            required
          />

        </div>

        <p
          class="subtitle"
          *ngIf="errorMessage"
        >
          {{ errorMessage }}
        </p>

        <p
          class="subtitle"
          *ngIf="successMessage"
        >
          {{ successMessage }}
        </p>

        <button
          class="btn"
          type="submit"
          [disabled]="loading"
        >
          {{ loading ? 'Registrando...' : 'Registrarme' }}
        </button>

      </form>

    </section>

  </main>

</ion-content>
