<ion-header>
  <ion-toolbar>
    <ion-title>Seguimiento</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen>

  <main class="app">

    <section class="screen">

      <!-- Barra superior -->
      <div class="topbar">

        <a
          class="icon-btn"
          routerLink="/home"
          aria-label="Regresar"
        >
          ‹
        </a>

        <h2>
          Seguimiento
        </h2>

        <span class="topbar-spacer"></span>

      </div>

      <!-- Estado general -->
      <div class="card metric">

        <div>
          <p class="muted">
            Estado general
          </p>

          <strong>
            Bueno
          </strong>
        </div>

        <span class="pill">
          Estable
        </span>

      </div>

      <!-- Hábitos -->
      <div class="card">

        <h3>
          Hábitos de hoy
        </h3>

        <div class="progress">
          <span class="progress-70"></span>
        </div>

        <p class="subtitle progress-text">
          70% completado
        </p>

      </div>

      <!-- Agua -->
      <div class="list-item">

        <div class="avatar">
          💧
        </div>

        <div>
          <h3>
            Agua
          </h3>

          <p class="muted">
            6 de 8 vasos
          </p>
        </div>

      </div>

      <!-- Actividad -->
      <div class="list-item">

        <div class="avatar">
          🚶
        </div>

        <div>
          <h3>
            Actividad
          </h3>

          <p class="muted">
            25 minutos registrados
          </p>
        </div>

      </div>

      <!-- Sueño -->
      <div class="list-item">

        <div class="avatar">
          😴
        </div>

        <div>
          <h3>
            Sueño
          </h3>

          <p class="muted">
            7 horas
          </p>
        </div>

      </div>

    </section>

    <!-- Navegación inferior -->
    <nav class="bottom-nav scanner-nav">

      <a
        class="nav-item"
        routerLink="/home"
      >
        <span>🏠</span>
        Inicio
      </a>

      <a
        class="nav-item"
        routerLink="/chat"
      >
        <span>💬</span>
        Chat
      </a>

      <a
        class="camera-nav"
        routerLink="/scan-comida"
        aria-label="Escanear comida"
      >
        <span>📷</span>
      </a>

      <a
        class="nav-item"
        routerLink="/calorias"
      >
        <span>🔥</span>
        Calorías
      </a>

      <a
        class="nav-item"
        routerLink="/perfil"
      >
        <span>👤</span>
        Perfil
      </a>

    </nav>

  </main>

</ion-content>
