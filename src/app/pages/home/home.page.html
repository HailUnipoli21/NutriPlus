<ion-header>
  <ion-toolbar>
    <ion-title>Home</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen>

  <main class="app">

    <section class="screen">

      <!-- Barra superior -->
      <div class="topbar">

        <div>
          <p class="muted">Hola,</p>

          <h1>
            Bienvenido/a
          </h1>
        </div>

        <a
          class="icon-btn"
          routerLink="/perfil"
          aria-label="Perfil"
        >
          👤
        </a>

      </div>

      <!-- Hero principal -->
      <div class="hero">

        <h1>
          ¿Cómo te sientes hoy?
        </h1>

        <p>
          Registra tus síntomas o conversa con el asistente de IA.
        </p>

      </div>

      <!-- Opciones principales -->
      <div class="grid">

        <a
          class="feature full-width"
          routerLink="/scan-comida"
        >
          <div class="emoji">
            📷
          </div>

          <div>
            <h3>
              Escanear comida
            </h3>

            <p>
              Usa la cámara para detectar alimentos.
            </p>
          </div>
        </a>

        <a
          class="feature"
          routerLink="/calorias"
        >
          <div class="emoji">
            🔥
          </div>

          <h3>
            Calorías
          </h3>

          <p>
            Consulta tu consumo del día.
          </p>
        </a>

        <a
          class="feature"
          routerLink="/chat"
        >
          <div class="emoji">
            🤖
          </div>

          <h3>
            Chat IA
          </h3>

          <p>
            Pregunta dudas generales de salud.
          </p>
        </a>

      </div>

    </section>

    <!-- Navegación inferior -->
    <nav class="bottom-nav scanner-nav">

      <a
        class="nav-item active"
        routerLink="/home"
      >
        <ion-icon name="home-outline"></ion-icon>
        Inicio
      </a>

      <a
        class="nav-item"
        routerLink="/chat"
      >
        <ion-icon name="chatbubble-outline"></ion-icon>
        Chat
      </a>

      <a
        class="camera-nav"
        routerLink="/scan-comida"
        aria-label="Escáner"
      >
        <ion-icon name="scan-outline"></ion-icon>
      </a>

      <a
        class="nav-item"
        routerLink="/calorias"
      >
        <ion-icon name="flame-outline"></ion-icon>
        Calorías
      </a>

      <a
        class="nav-item"
        routerLink="/perfil"
      >
        <ion-icon name="person-outline"></ion-icon>
        Perfil
      </a>

    </nav>

  </main>

</ion-content>
