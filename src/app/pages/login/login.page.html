<ion-header>
  <ion-toolbar>
    <ion-title>Login</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen>

  <main class="app">

    <section class="screen login-screen">

      <!-- Topbar -->
      <div class="topbar">

        <a
          class="icon-btn"
          routerLink="/bienvenida"
          aria-label="Regresar"
        >
          ‹
        </a>

        <div class="logo">
          <img class="logo-img" src="assets/logo.jpg" alt="NutriPlus Logo" />
          NutriPlus
        </div>

        <span class="topbar-spacer"></span>

      </div>

      <!-- Título -->
      <h1 class="title">
        Iniciar sesión
      </h1>

      <p class="subtitle">
        Accede a tu panel de salud personalizado.
      </p>

      <!-- Formulario -->
      <form
        class="card login-form"
        (ngSubmit)="entrar()"
      >

        <div class="field">

          <label>
            Correo electrónico
          </label>

          <input
            class="input"
            type="email"
            name="email"
            placeholder="tuemail@correo.com"
            autocomplete="email"
            [(ngModel)]="email"
            required
          />

        </div>

        <div class="field">

          <label>
            Contraseña
          </label>

          <input
            class="input"
            type="password"
            name="password"
            placeholder="********"
            autocomplete="current-password"
            [(ngModel)]="password"
            required
          />

        </div>

        <p
          class="subtitle"
          *ngIf="errorMessage"
        >
          {{ errorMessage }}
        </p>

        <button
          class="btn"
          type="submit"
          [disabled]="loading"
        >
          {{ loading ? 'Ingresando...' : 'Entrar' }}
        </button>

        <a
          class="small-link"
          routerLink="/registro"
        >
          ¿No tienes cuenta? Regístrate
        </a>

      </form>

    </section>

  </main>

</ion-content>
