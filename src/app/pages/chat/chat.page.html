<ion-header>
  <ion-toolbar>
    <ion-title>Chat IA</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen>

  <main class="app">

    <section class="screen chat-screen">

      <!-- Topbar -->
      <div class="topbar">

        <a
          class="icon-btn"
          routerLink="/home"
          aria-label="Regresar"
        >
          ‹
        </a>

        <h2>
          Asistente IA
        </h2>

        <button
          class="icon-btn clear-btn"
          (click)="limpiarConversacion()"
          aria-label="Limpiar Conversación"
        >
          🗑️
        </button>

      </div>

      <!-- Chat Container -->
      <div class="chat" #chatContainer>

        <div 
          *ngFor="let msg of getVisibleMessages()" 
          class="bubble" 
          [ngClass]="{ 'ai': msg.role === 'assistant', 'user': msg.role === 'user' }"
          [innerHTML]="formatMarkdown(msg.content)"
        >
        </div>

        <!-- Indicador de carga de IA -->
        <div class="bubble ai typing" *ngIf="loading">
          <div class="dot-bounce">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>

      </div>

      <!-- Input de chat -->
      <div class="chat-input">

        <textarea
          class="chat-textarea"
          placeholder="Escribe tu mensaje..."
          [(ngModel)]="newMessageText"
          (keydown.enter)="$event.preventDefault(); sendMessage()"
          [disabled]="loading"
          rows="1"
        ></textarea>

        <button 
          type="button" 
          (click)="sendMessage()"
          [disabled]="loading || !newMessageText.trim()"
        >
          ➤
        </button>

      </div>

    </section>

    <!-- Navegación inferior -->
    <nav class="bottom-nav scanner-nav">

      <a
        class="nav-item"
        routerLink="/home"
      >
        <ion-icon name="home-outline"></ion-icon>
        Inicio
      </a>

      <a
        class="nav-item active"
        routerLink="/chat"
      >
        <ion-icon name="chatbubble-outline"></ion-icon>
        Chat
      </a>

      <a
        class="camera-nav"
        routerLink="/scan-comida"
        aria-label="Escáner"
      >
        <ion-icon name="scan-outline"></ion-icon>
      </a>

      <a
        class="nav-item"
        routerLink="/calorias"
      >
        <ion-icon name="flame-outline"></ion-icon>
        Calorías
      </a>

      <a
        class="nav-item"
        routerLink="/perfil"
      >
        <ion-icon name="person-outline"></ion-icon>
        Perfil
      </a>

    </nav>

  </main>

</ion-content>
