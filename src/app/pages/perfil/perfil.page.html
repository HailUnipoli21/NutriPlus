<ion-header>
  <ion-toolbar>
    <ion-title>Perfil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen>

  <main class="app">

    <section class="screen">

      <!-- Barra superior -->
      <div class="topbar">

        <a
          class="icon-btn"
          routerLink="/home"
          aria-label="Regresar"
        >
          ‹
        </a>

        <h2>
          Perfil
        </h2>

        <span class="topbar-spacer"></span>

      </div>

      <!-- Perfil -->
      <div class="card profile-head">

        <div class="profile-photo">
          👤
        </div>

        <h2>
          {{ fullName || 'Usuario NutriPlus' }}
        </h2>

        <p class="muted">
          {{ email }}
        </p>

      </div>

      <!-- Formulario -->
      <form class="card profile-form">

        <div class="field">

          <label>
            Edad
          </label>

          <input
            class="input"
            type="number"
            name="age"
            min="1"
            max="120"
            placeholder="Ej. 19"
            [(ngModel)]="age"
          />

        </div>

        <div class="field">

          <label>
            Sexo biológico
          </label>

          <select
            class="input"
            name="biologicalSex"
            [(ngModel)]="biologicalSex"
          >
            <option [ngValue]="null">
              Selecciona una opción
            </option>

            <option value="male">
              Hombre
            </option>

            <option value="female">
              Mujer
            </option>
          </select>

        </div>

        <div class="field">

          <label>
            Peso actual
          </label>

          <input
            class="input"
            type="number"
            name="weightKg"
            min="1"
            step="0.1"
            placeholder="Ej. 58 kg"
            [(ngModel)]="weightKg"
          />

        </div>

        <div class="field">

          <label>
            Estatura
          </label>

          <input
            class="input"
            type="number"
            name="heightCm"
            min="1"
            step="0.1"
            placeholder="Ej. 165 cm"
            [(ngModel)]="heightCm"
          />

        </div>

        <div class="field">

          <label>
            Nivel de actividad diaria
          </label>

          <select
            class="input"
            name="activityLevel"
            [(ngModel)]="activityLevel"
          >
            <option [ngValue]="null">
              Selecciona una opción
            </option>

            <option value="sedentary">
              Sedentario
            </option>

            <option value="light">
              Actividad ligera
            </option>

            <option value="moderate">
              Actividad moderada
            </option>

            <option value="high">
              Actividad alta
            </option>

            <option value="very_high">
              Actividad muy alta
            </option>
          </select>

        </div>

        <div class="field">

          <label>
            Objetivo
          </label>

          <select
            class="input"
            name="goal"
            [(ngModel)]="goal"
            (ngModelChange)="onGoalChange($event)"
          >
            <option [ngValue]="null">
              Selecciona una opción
            </option>

            <option value="lose_weight">
              Bajar de peso
            </option>

            <option value="maintain_weight">
              Mantener peso
            </option>

            <option value="gain_muscle">
              Ganar masa muscular
            </option>
          </select>

        </div>

        <div
          class="field"
          *ngIf="goal === 'lose_weight'"
        >

          <label>
            Ritmo deseado de pérdida de peso
          </label>

          <select
            class="input"
            name="weightLossPace"
            [(ngModel)]="weightLossPace"
          >
            <option [ngValue]="null">
              Selecciona una opción
            </option>

            <option value="slow">
              Lento
            </option>

            <option value="moderate">
              Moderado
            </option>

            <option value="fast">
              Rápido
            </option>
          </select>

        </div>


        <p
          class="profile-message error"
          *ngIf="errorMessage"
        >
          {{ errorMessage }}
        </p>

        <p
          class="profile-message success"
          *ngIf="successMessage"
        >
          {{ successMessage }}
        </p>

        <button
          class="btn green"
          type="button"
          (click)="guardarCambios()"
          [disabled]="loading"
        >
          {{ loading ? 'Guardando...' : 'Guardar cambios' }}
        </button>

      </form>

      <!-- Configuración de Chatbot IA (Ollama) -->
      <button
        class="btn config-btn-perfil"
        type="button"
        (click)="toggleConfig()"
      >
        {{ showConfig ? 'Ocultar Configuración IA' : 'Configurar Chatbot IA' }}
      </button>

      <!-- Panel de Configuración de Ollama -->
      <div class="card config-panel" *ngIf="showConfig" style="margin-top: 16px;">
        <h3 style="font-size: 16px; color: #ffffff; margin-bottom: 12px; font-weight: 700; border-bottom: 1px solid rgba(110, 86, 143, 0.08); padding-bottom: 6px;">
          Configurar Ollama (Aura)
        </h3>
        
        <div class="field">
          <label>URL de la API:</label>
          <input 
            class="input"
            type="text" 
            [(ngModel)]="ollamaUrl" 
            placeholder="http://localhost:11434"
          />
        </div>

        <div class="field">
          <label>Modelo:</label>
          <input 
            class="input"
            type="text" 
            [(ngModel)]="ollamaModel" 
            placeholder="qwen2.5"
          />
        </div>

        <div class="test-connection-area" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 8px;">
          <button type="button" class="btn secondary" style="width: auto; padding: 10px 14px; font-size: 13px; margin: 0;" (click)="probarConexion()">
            Probar Conexión
          </button>
          <div class="test-status" style="font-size: 12px; font-weight: 600;">
            <span *ngIf="testConnectionStatus === 'success'" style="color: #50fa7b;">✅ ¡Conectado!</span>
            <span *ngIf="testConnectionStatus === 'error'" style="color: #ff5252;">❌ Error de conexión</span>
          </div>
        </div>

        <button type="button" class="btn green" (click)="saveConfig()">Guardar Configuración</button>
      </div>

      <!-- Cerrar sesión -->
      <button
        class="btn logout-btn"
        type="button"
        (click)="cerrarSesion()"
      >
        Cerrar sesión
      </button>

    </section>

    <!-- Navegación inferior -->
    <nav class="bottom-nav scanner-nav">

      <a
        class="nav-item"
        routerLink="/home"
      >
        <ion-icon name="home-outline"></ion-icon>
        Inicio
      </a>

      <a
        class="nav-item"
        routerLink="/chat"
      >
        <ion-icon name="chatbubble-outline"></ion-icon>
        Chat
      </a>

      <a
        class="camera-nav"
        routerLink="/scan-comida"
        aria-label="Escáner"
      >
        <ion-icon name="scan-outline"></ion-icon>
      </a>

      <a
        class="nav-item"
        routerLink="/calorias"
      >
        <ion-icon name="flame-outline"></ion-icon>
        Calorías
      </a>

      <a
        class="nav-item active"
        routerLink="/perfil"
      >
        <ion-icon name="person-outline"></ion-icon>
        Perfil
      </a>

    </nav>

  </main>

</ion-content>
