<ion-header>
  <ion-toolbar>
    <ion-title>Perfil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen>

  <main class="app">

    <section class="screen">

      <!-- Barra superior -->
      <div class="topbar">

        <a
          class="icon-btn"
          routerLink="/home"
          aria-label="Regresar"
        >
          ‹
        </a>

        <h2>
          Perfil
        </h2>

        <span class="topbar-spacer"></span>

      </div>

      <!-- Perfil -->
      <div class="card profile-head">

        <div class="profile-photo">
          👤
        </div>

        <h2>
          Usuario Salud IA
        </h2>

        <p class="muted">
          usuario@correo.com
        </p>

      </div>

      <!-- Formulario -->
      <form class="card profile-form">

        <div class="field">

          <label>
            Edad
          </label>

          <input
            class="input"
            type="number"
            placeholder="Ej. 19"
          />

        </div>

        <div class="field">

          <label>
            Peso
          </label>

          <input
            class="input"
            type="text"
            placeholder="Ej. 58 kg"
          />

        </div>

        <div class="field">

          <label>
            Estatura
          </label>

          <input
            class="input"
            type="text"
            placeholder="Ej. 1.65 m"
          />

        </div>

        <button
          class="btn green"
          type="button"
        >
          Guardar cambios
        </button>

      </form>

      <!-- Cerrar sesión -->
      <a
        class="small-link"
        routerLink="/login"
      >
        Cerrar sesión
      </a>

    </section>

    <!-- Navegación inferior -->
    <nav class="bottom-nav scanner-nav">

      <a
        class="nav-item"
        routerLink="/home"
      >
        <span>🏠</span>
        Inicio
      </a>

      <a
        class="nav-item"
        routerLink="/chat"
      >
        <span>💬</span>
        Chat
      </a>

      <a
        class="camera-nav"
        routerLink="/scan-comida"
        aria-label="Escanear comida"
      >
        <span>📷</span>
      </a>

      <a
        class="nav-item"
        routerLink="/calorias"
      >
        <span>🔥</span>
        Calorías
      </a>

      <a
        class="nav-item active"
        routerLink="/perfil"
      >
        <span>👤</span>
        Perfil
      </a>

    </nav>

  </main>

</ion-content>
